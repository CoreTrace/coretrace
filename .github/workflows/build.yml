name: Build

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            curl \
            ca-certificates \
            lsb-release \
            software-properties-common
          curl -fsSL https://apt.llvm.org/llvm.sh -o /tmp/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-20 \
            llvm-20-dev \
            clang-20 \
            libclang-20-dev
          echo "LLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm" >> "$GITHUB_ENV"
          echo "Clang_DIR=/usr/lib/llvm-20/lib/cmake/clang" >> "$GITHUB_ENV"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install cmake ninja llvm@20
          echo "LLVM_DIR=$(brew --prefix llvm@20)/lib/cmake/llvm" >> "$GITHUB_ENV"
          echo "Clang_DIR=$(brew --prefix llvm@20)/lib/cmake/clang" >> "$GITHUB_ENV"
          echo "$(brew --prefix llvm@20)/bin" >> "$GITHUB_PATH"

      - name: Configure CMake
        run: |
          set -euo pipefail
          cmake -S . -B build -G Ninja \
            -DPARSER_TYPE=CLI11 \
            -DUSE_THREAD_SANITIZER=OFF \
            -DUSE_ADDRESS_SANITIZER=OFF \
            -DLLVM_DIR="${LLVM_DIR}" \
            -DClang_DIR="${Clang_DIR}"

      - name: Build
        run: |
          set -euo pipefail
          cmake --build build --config Release -j4

      - name: Smoke test
        run: |
          set -euo pipefail
          ./build/ctrace -h
