# SPDX-License-Identifier: Apache-2.0
name: Build Release Binaries

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-binaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RELEASE_BASENAME: coretrace
  RELEASE_BINARY: ctrace

jobs:
  build-linux-binaries:
    name: Build Linux binary (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve artifact version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="sha-${short_sha}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build packaged binary with Buildx
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/${{ matrix.arch }}"
          mkdir -p "${out_dir}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --file Dockerfile.release-binaries \
            --target artifacts \
            --build-arg VERSION="${{ steps.version.outputs.value }}" \
            --build-arg PROJECT_NAME="${{ env.RELEASE_BASENAME }}" \
            --build-arg BINARY_NAME="${{ env.RELEASE_BINARY }}" \
            --output "type=local,dest=${out_dir}" \
            .
          ls -la "${out_dir}"

      - name: Validate artifact files
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir="dist/${{ matrix.arch }}"
          archive="${artifact_dir}/${{ env.RELEASE_BASENAME }}-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}.tar.gz"
          checksum="${archive}.sha256"
          test -f "${archive}" || { echo "missing archive: ${archive}"; exit 1; }
          test -f "${checksum}" || { echo "missing checksum: ${checksum}"; exit 1; }
          (
            cd "${artifact_dir}"
            sha256sum -c "$(basename "${checksum}")"
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_BASENAME }}-${{ steps.version.outputs.value }}-linux-${{ matrix.arch }}
          path: |
            dist/${{ matrix.arch }}/*.tar.gz
            dist/${{ matrix.arch }}/*.sha256
          if-no-files-found: error

  build-windows-binary:
    name: Build Windows binary (x64, LLVM 20.1.0)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dependency ref
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ref = if ($env:GITHUB_HEAD_REF) { $env:GITHUB_HEAD_REF } else { $env:GITHUB_REF_NAME }
          "DEPENDENCY_REF=$ref" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout coretrace-compiler matching ref
        id: checkout_compiler_ref
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: CoreTrace/coretrace-compiler
          ref: ${{ env.DEPENDENCY_REF }}
          path: deps/coretrace-compiler
          fetch-depth: 1

      - name: Checkout coretrace-compiler main fallback
        if: steps.checkout_compiler_ref.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: CoreTrace/coretrace-compiler
          ref: main
          path: deps/coretrace-compiler
          fetch-depth: 1

      - name: Checkout coretrace-stack-analyzer matching ref
        id: checkout_stack_ref
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: CoreTrace/coretrace-stack-analyzer
          ref: ${{ env.DEPENDENCY_REF }}
          path: deps/coretrace-stack-analyzer
          fetch-depth: 1

      - name: Checkout coretrace-stack-analyzer main fallback
        if: steps.checkout_stack_ref.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: CoreTrace/coretrace-stack-analyzer
          ref: main
          path: deps/coretrace-stack-analyzer
          fetch-depth: 1

      - name: Checkout coretrace-log matching ref
        id: checkout_logger_ref
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: CoreTrace/coretrace-log
          ref: ${{ env.DEPENDENCY_REF }}
          path: deps/coretrace-log
          fetch-depth: 1

      - name: Checkout coretrace-log main fallback
        if: steps.checkout_logger_ref.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: CoreTrace/coretrace-log
          ref: main
          path: deps/coretrace-log
          fetch-depth: 1

      - name: Resolve artifact version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="sha-${short_sha}"
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install LLVM 20.1.0 to fixed location
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $llvmVersion = "20.1.0"
          $installerUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-win64.exe"
          $installerPath = "$env:RUNNER_TEMP\LLVM-$llvmVersion-win64.exe"
          $installRoot = "C:\Program Files\LLVM-$llvmVersion"
          $llvmCmakeDir = "$installRoot\lib\cmake\llvm"
          $clangCmakeDir = "$installRoot\lib\cmake\clang"

          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          Start-Process -FilePath $installerPath -ArgumentList @("/S", "/D=$installRoot") -Wait -NoNewWindow

          if (-not (Test-Path "$installRoot\bin\clang-cl.exe")) {
            throw "clang-cl.exe not found after LLVM install: $installRoot\bin\clang-cl.exe"
          }
          if (-not (Test-Path $llvmCmakeDir)) {
            throw "LLVM CMake package dir not found: $llvmCmakeDir"
          }
          if (-not (Test-Path $clangCmakeDir)) {
            throw "Clang CMake package dir not found: $clangCmakeDir"
          }

          $clangVersion = & "$installRoot\bin\clang-cl.exe" --version
          if ($clangVersion -notmatch "clang version 20\.1\.0") {
            throw "Unexpected clang-cl version. Got: $clangVersion"
          }

          "LLVM_CMAKE_DIR=$llvmCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_DIR=$llvmCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Clang_DIR=$clangCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build packaged binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File .\scripts\build-windows.ps1 `
            -LLVMDir "${env:LLVM_CMAKE_DIR}" `
            -CompilerSourceDir "${PWD}\deps\coretrace-compiler" `
            -StackAnalyzerSourceDir "${PWD}\deps\coretrace-stack-analyzer" `
            -LoggerSourceDir "${PWD}\deps\coretrace-log" `
            -Configuration Release `
            -VersionOverride "${{ steps.version.outputs.value }}" `
            -PackageZip

      - name: Stage release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          $zipFile = "coretrace-windows-Release.zip"
          if (-not (Test-Path $zipFile)) {
            throw "missing archive: $zipFile"
          }
          Copy-Item -LiteralPath $zipFile -Destination "dist/windows/${{ env.RELEASE_BASENAME }}-${{ steps.version.outputs.value }}-windows-amd64.zip" -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_BASENAME }}-${{ steps.version.outputs.value }}-windows-amd64
          path: dist/windows/*.zip
          if-no-files-found: error

  publish-release-assets:
    name: Attach binaries to GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build-linux-binaries
      - build-windows-binary
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.RELEASE_BASENAME }}-*
          path: dist
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
